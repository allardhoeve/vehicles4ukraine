# Push results to remote API instead of local SQLite
api:
  url: https://v4u.allard.dev/api/vehicles
  user: v4u
  pass: wap5

criteria:
  max_price: 5000        # EUR
  fuel: DIESEL
  transmission: HANDMATIG
  exclude_3door: true

delay_between_requests: 2  # seconds

targets:
  - make: nissan
    model: navara
    slug: nissan/navara
    priority: medium

  - make: mitsubishi
    model: l200
    slug: mitsubishi/l-200
    priority: medium

  - make: nissan
    model: patrol
    slug: nissan/patrol
    priority: medium

  - make: mitsubishi
    model: pajero
    slug: mitsubishi/pajero
    priority: medium

  - make: kia
    model: sorento
    slug: kia/sorento
    priority: medium

  - make: hyundai
    model: terracan
    slug: hyundai/terracan
    priority: medium

  - make: toyota
    model: hilux
    slug: toyota/hilux
    priority: high

  - make: toyota
    model: land-cruiser
    slug: toyota/land-cruiser
    priority: high

  - make: ford
    model: ranger
    slug: ford/ranger
    priority: high

  - make: isuzu
    model: d-max
    slug: isuzu/d-max
    priority: medium
